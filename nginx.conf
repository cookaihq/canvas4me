server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── 压缩 ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ─── 资产长缓存 (vite 输出文件名带 hash) ────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── index.html 不缓存 (保证版本即时更新) ───────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ─── SPA fallback ───────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── 健康检查 ───────────────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── 版本信息 (build 时由 version-json-plugin 写入 dist) ──
    location = /version {
        try_files /version.json =404;
        default_type application/json;
        add_header Cache-Control "no-store";
    }
}
